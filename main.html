<!DOCTYPE html>
<html>
	<head>
		<script src="main.js" defer></script>
		<style>
			body {
				width: 100vw;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<virtual-grid id="grid"></virtual-grid>
	</body>
	<script>
		customElements.whenDefined('virtual-grid').then(() => {
			let virtual_grid = document.getElementById('grid')
			let o = {}
			for (let i = 0; i < 2505; i++) {
				o[i] = [i*1, i*2, i*3, i*4, i*5, 'alex']
			}
			virtual_grid.setData(o)			
		})
	</script>
</html>
